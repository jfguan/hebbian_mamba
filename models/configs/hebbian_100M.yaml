# Hebbian Conv — 100M params
model: hebbian_minimal
tag: hebbian_100M

dataset: the_stack

# Model
d_model: 1024
n_layers: 12
d_conv: 4
expand: 2
memory_alpha: 0.03
chunk_size: 64

# Training
steps: 2000
total_steps: 64000
batch_size: 1
seq_len: 2048
lr: 3e-4
warmup: 500
grad_accum: 1
eval_interval: 200
ckpt_interval: 2000
