# Hebbian Mamba — 100M params
model: hebbian_mamba
tag: hebbian_mamba_100M

dataset: code_parrot

# Model
d_model: 1024
n_layers: 12
d_state: 16
d_conv: 4
expand: 2
memory_alpha: 0.03
chunk_size: 64

# Training
steps: 2000
total_steps: 500000
batch_size: 1
seq_len: 2048
lr: 3e-4
warmup: 200
grad_accum: 1
eval_interval: 200
ckpt_interval: 1000
